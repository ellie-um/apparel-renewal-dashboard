<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오프린트미 어패럴 리뉴얼 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e17;--surface:#111827;--surface2:#1a2332;--border:#1e293b;
  --text:#e2e8f0;--text-muted:#94a3b8;--accent:#3b82f6;--accent2:#8b5cf6;
  --green:#10b981;--orange:#f59e0b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:40px 20px;}
.container{max-width:720px;width:100%;}
.header{margin-bottom:40px;}
.header h1{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.header p{color:var(--text-muted);font-size:13px;line-height:1.6;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#1a3a2a;color:#34d399;margin-top:8px;}

.week-list{display:flex;flex-direction:column;gap:12px;}
.week-card{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;text-decoration:none;color:var(--text);transition:all 0.2s ease;position:relative;overflow:hidden;}
.week-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--accent),var(--accent2));opacity:0;transition:opacity 0.2s;}
.week-card:hover{border-color:var(--accent);background:var(--surface2);transform:translateX(4px);}
.week-card:hover::before{opacity:1;}
.week-card.latest{border-color:rgba(59,130,246,0.3);}
.week-card.latest::before{opacity:1;}

.week-info{flex:1;}
.week-date{font-size:17px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:10px;}
.week-date .tag-latest{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:rgba(59,130,246,0.15);color:var(--accent);letter-spacing:0.5px;}
.week-desc{font-size:12px;color:var(--text-muted);line-height:1.5;}

.week-arrow{font-size:18px;color:var(--text-muted);transition:color 0.2s;}
.week-card:hover .week-arrow{color:var(--accent);}

.footer{margin-top:48px;padding-top:20px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted);text-align:center;line-height:1.8;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>어패럴 리뉴얼 대시보드</h1>
    <p>오프린트미 어패럴 서비스 리뉴얼 진행 현황을 주차별로 기록합니다.</p>
    <span class="badge">ohprint.me</span>
  </div>

  <div class="week-list">

    <!-- ✅ 최신 주차를 맨 위에, class="week-card latest" 부여 -->
    <a href="./260318/" class="week-card latest">
      <div class="week-info">
        <div class="week-date">2026.03.17 ~ <span class="tag-latest">LATEST</span></div>
        <div class="week-desc">어패럴 리뉴얼 분석 대시보드 v2 — 경쟁사 비교, 카테고리 구조, KPI 분석</div>
      </div>
      <div class="week-arrow">→</div>
    </a>

    <!--
    === 새 주차 추가 가이드 ===
    1. 아래 템플릿을 복사해서 위 최신 카드 바로 아래에 붙여넣기
    2. 기존 최신 카드에서 class="week-card latest" → class="week-card" 으로 변경
    3. 기존 최신 카드에서 <span class="tag-latest">LATEST</span> 삭제
    4. 새 카드의 href, 날짜, 설명을 수정

    <a href="./YYMMDD/" class="week-card latest">
      <div class="week-info">
        <div class="week-date">2026.MM.DD ~ <span class="tag-latest">LATEST</span></div>
        <div class="week-desc">이번 주차 설명을 여기에 작성</div>
      </div>
      <div class="week-arrow">→</div>
    </a>
    -->

  </div>

  <div class="footer">
    snaps-corp · 오프린트미 어패럴 리뉴얼 프로젝트<br>
    Powered by Claude & GitHub Pages
  </div>
</div>
</body>
</html>
